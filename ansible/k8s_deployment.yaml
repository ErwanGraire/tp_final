apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-tp
  template:
    metadata:
      labels:
        app: api-tp
    spec:
      containers:
      - name: api-container
        image: errwwaann/api-tp-final:v1
        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: api-tp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
