---
- name: "Installation de k3s"
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: "Installer k3s"
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s
    - name: "Vérifier le status"
      command: k3s kubectl get nodes
      register: nodes
      until: '" Ready " in nodes.stdout'
      retries: 10
      delay: 5
