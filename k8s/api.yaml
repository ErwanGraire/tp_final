apiVersion: v1
kind: Service
metadata:
  name: lacet-api-svc
spec:
  type: NodePort
  selector:
    app: lacet-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 32580
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lacet-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lacet-api
  template:
    metadata:
      labels:
        app: lacet-api
    spec:
      containers:
        - name: api
          image: errwwaann/lacet-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: "mysql-service"
            - name: DB_USER
              value: "lacets_user"
            - name: DB_PASSWORD
              value: "lacets_pass"
            - name: DB_NAME
              value: "lacets_db"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lacet-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lacet-api
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
